  <rect x="0" y="20" width="638" height="160" fill="#283593"/>
  
  <!-- Company name placeholder -->
  <text x="319" y="80" text-anchor="middle" font-family="Arial" font-size="36" font-weight="bold" fill="white">COMPANY NAME</text>
  <text x="319" y="120" text-anchor="middle" font-family="Arial" font-size="18" fill="#bbdefb">EMPLOYEE ID CARD</text>
  
  <!-- Photo placeholder -->
