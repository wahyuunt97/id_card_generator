  <rect x="0" y="880" width="638" height="112" rx="0" ry="20" fill="#283593"/>
  <text x="319" y="950" text-anchor="middle" font-family="Arial" font-size="14" fill="#bbdefb">ID: XXXX-XXXX-XXXX</text>
